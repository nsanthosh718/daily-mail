name: Interesting News Watcher

on:
  schedule:
    # check every 15 minutes for very interesting/breaking items
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and send interesting news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py --mode interesting
